version: '3.9'

services:
  # ── Proxmox VE (lab/dev — dockurr image) ─────────────────────────────────
  proxmox:
    image: dockurr/proxmox
    container_name: proxmox
    privileged: true
    environment:
      - PASSWORD=${PROXMOX_ROOT_PASSWORD:-changeme123}
    ports:
      - "8006:8006"
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:8006/api2/json/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vmp-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vmpdb}
      POSTGRES_USER: ${POSTGRES_USER:-vmp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vmppass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vmp} -d ${POSTGRES_DB:-vmpdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (sessions + rate-limit + pub/sub) ───────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vmp-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Middleware (Node.js) ───────────────────────────────────────────────
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: vmp-api
    env_file: ../.env
    environment:
      - NODE_ENV=production
      - PORT=4000
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-vmp}:${POSTGRES_PASSWORD:-vmppass}@postgres:5432/${POSTGRES_DB:-vmpdb}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      - PROXMOX_URL=https://proxmox:8006/api2/json
      - PROXMOX_TOKEN=${PROXMOX_API_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=http://portal:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      proxmox:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Customer Portal (Next.js) ─────────────────────────────────────────────
  portal:
    build:
      context: ../apps/portal
      dockerfile: Dockerfile
    container_name: vmp-portal
    env_file: ../.env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api:4000
      - NEXT_PUBLIC_WS_URL=ws://api:4000
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - API_INTERNAL_URL=http://api:4000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: vmp-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - portal
      - api
    networks:
      - internal
      - public
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
    internal: true
  public:
    driver: bridge
